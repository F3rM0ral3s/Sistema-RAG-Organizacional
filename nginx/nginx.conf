worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Rate limiting zone: 1 request/second per IP for GET polling
    limit_req_zone $binary_remote_addr zone=poll_limit:10m rate=2r/s;

    upstream backend {
        server 127.0.0.1:8000;
    }

    server {
        listen 80;
        server_name _;

        # Serve frontend static files
        location / {
            root /workspace/app/frontend;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # API: query submission (POST) — no rate limit, backend handles per-user limiting
        location = /api/query {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # API: polling & other GET endpoints — rate limited per IP
        location /api {
            limit_req zone=poll_limit burst=10 nodelay;
            limit_req_status 429;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }
    }
}
